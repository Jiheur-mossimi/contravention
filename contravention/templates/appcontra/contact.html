{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header bg-primary">
                <div class="card-title text-white"> + Nouveau Contact</div>
            </div>
            {% csrf_token %}
            <div class="card-body">
                <div class="form-group">
                    <label>Id</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter Id">
                </div>
                <div class="form-group">
                    <label>Assujettis</label>
                    <input 
                        type="email" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter Infraction">
                </div>
                <div class="form-group">
                    <label>Telephone</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter Telephone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input 
                        type="email" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Entrer Email">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control bg-light" id="message" rows="5">
                    </textarea>
                </div>
            </div>
            <div class="card-action">
                <a href="#"><button class="btn btn-success btn-lg">
                    Valider
                </button></a>
                <a href="{% url 'contacts' %}"><button class="btn btn-danger btn-lg">
                    Annuler
                </button></a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
