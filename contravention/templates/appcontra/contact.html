{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header bg-primary">
                <div class="card-title text-white"> + Nouveau Contact</div>
            </div>
            <form class="forms-sample" method="POST" action="{% url 'econtact' %}">
                {% csrf_token %}
                <div class="card-body">
                    <div class="form-group">
                        <label>numero</label>
                        <input 
                            type="text"
                            name="numero"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Numero" id="numero">
                    </div>
                    <div class="form-group">
                        <label for="assujettis" _msttexthash="432653" _msthash="197">Assujettis</label>
                        <select class="form-select form-control" id="assujettis" name="assujettis">
                            <option _msttexthash="4823" _msthash="202" value="{{ c.assujettis }}">Selectionner un assujettis
                                {% for ass in assujettis %}
                                <option value="{{ ass.numero }}">{{ ass.noms }}</option>
                                {% endfor %}
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Telephone</label>
                        <input 
                            type="text"
                            name="telephone"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Telephone" id="telephone">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input 
                            type="email"
                            name="email"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Email" id="email">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea 
                            name="message"
                            class="form-control bg-light" 
                            id="message" 
                            rows="5"
                            placeholder="Entrer votre message" id="message">
                        </textarea>
                    </div>
                </div>
                <div class="card-action">
                    <button type="submit" class="btn btn-success btn-lg">
                        Valider
                    </button>
                    <a href="{% url 'contacts' %}" class="btn btn-danger btn-lg">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
