{% comment %} {% extends "base.html" %}
{% load static %}
{% block content %}
{% if ass %}

<div class="col-12 grid-margin stretch-card">
    <div class="card">
        <div class="card-body">
            <h3>Modification d'assujettis : {{ ass.id }}</h3>
            <form class="forms-sample" action="{% url 'emassujettis' %}" method="post">
                {% csrf_token %}
                <input type="hidden" class="form-control" id="id" name="id" value="{{ ass.id }}">
                
                <div class="form-group">
                    <label for="noms">Noms</label>
                    <input type="text" class="form-control" id="noms" name="noms" value="{{ ass.noms  }}">
                </div>
                <div class="form-group">
                    <label for="sexe">Sexe</label>
                    <input type="text" class="form-control" id="sexe" name="sexe" value="{{ ass.sexe }}">
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" id="date" name="date" value="{{ ass.date|default_if_none:''|date:'Y-m-d' }}">
                </div>
                <div class="form-group">
                    <label for="adresse">Adresse</label>
                    <input type="text" class="form-control" id="adresse" name="adresse" value="{{ ass.adresse }}">
                </div>
                <div class="form-group">
                    <label for="telephone">Telephone</label>
                    <input type="text" class="form-control" id="telephone" name="telephone" value="{{ ass.telephone }}">
                </div>
                <button type="submit" class="btn btn-info mr-2">Valider</button>
                <button type="reset" class="btn btn-light"><a href="{% url 'assujettis' %}">Annuler</a></button>
            </form>
        </div>
    </div>
</div>
{% endif %}
{% endblock content %} {% endcomment %}
