{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header bg-primary">
                <div class="card-title text-white"> + Nouveau Paiement</div>
            </div>
            {% csrf_token %}
            <div class="card-body">
                <div class="form-group">
                    <label>Numero</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter numero">
                </div>
                <div class="form-group">
                    <label>Amende</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter Amende">
                </div>
                <div class="form-group">
                    <label for="datep">Date paiement</label>
                    <input 
                        type="date" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter datep">
                </div>
                <div class="form-group">
                    <label>Mode</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg bg-light" 
                        placeholder="Enter mode">
                </div>
            </div>
            <div class="card-action">
                <a href="#"><button class="btn btn-success btn-lg">
                    Valider
                </button></a>
                <a href="{% url 'paiements' %}"><button class="btn btn-danger btn-lg">
                    Annuler
                </button></a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
