{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header bg-primary">
                <div class="card-title text-white"> + Nouvelle Infraction</div>
            </div>

            <form class="forms-sample" method="POST" action="{% url 'einfraction' %}">
                {% csrf_token %}
                <div class="card-body">
                    <div class="form-group">
                        <label>Id</label>
                        <input 
                            type="text"
                            name="id"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Id" id="id">
                    </div>
                    <div class="form-group">
                        <label>Assujettis</label>
                        <input 
                            type="text"
                            name="assujettis"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Assujettis" id="assujettis">
                    </div>
                    <div class="form-group">
                        <label for="detail">Detail</label>
                        <textarea 
                            name="detail"
                            class="form-control bg-light" 
                            id="detail" 
                            rows="5"
                            placeholder="Entrer le detail" id="detail"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Date de l'infraction</label>
                        <input 
                            type="date"
                            name="datein"
                            class="form-control form-control-lg bg-light" id="datein">
                    </div>
                    <div class="form-group">
                        <label>Lieu</label>
                        <input 
                            type="text"
                            name="lieu"
                            class="form-control form-control-lg bg-light" 
                            placeholder="Enter lieu" id="lieu">
                    </div>
                </div>
                <div class="card-action">
                    <button type="submit" class="btn btn-success btn-lg">
                        Valider
                    </button>
                    <a href="{% url 'infractions' %}" class="btn btn-danger btn-lg">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
