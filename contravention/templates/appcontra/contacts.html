{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title text-dark" _msttexthash="224159" _msthash="96">
            <h3>Liste des contacts</h3><a href="{% url 'contact' %}">
            <button class="btn btn-primary btn-round ms-auto d-flex justify-content-between" data-bs-toggle="modal" data-bs-target="#addRowModal">
                <i class="fa fa-plus"></i>
                <font _mstmutation="1" _msttexthash="290550" _msthash="483">
                Ajouter une ligne
                </font>
            </button></a>
        </div>   
    </div>
    <div class="card-body">
        <table class="table mt-3">
            <thead>
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Assujettis</th>
                    <th scope="col" _msttexthash="133978" _msthash="98">telephone</th>
                    <th scope="col" _msttexthash="94367" _msthash="99">email</th>
                    <th scope="col" _msttexthash="113646" _msthash="100">message</th>
                </tr>
            </thead>
            <tbody>

                {% for c in contacts %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.assujettis }}</td>
                        <td>{{ c.telephone }}</td>
                        <td>{{ c.email }}</td>
                        <td>{{ c.message }}</td>
                        <td>
                            <a href="{% url 'mcontact' c.id %}">
                                <i class="fas fa-pen-square"></i>
                            </a>
                            <a href="{% url 'scontact' c.id %}">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock content %}
