{% comment %} {% extends "base.html" %}
{% load static %}
{% block content %}
{% if p %}

<div class="col-12 grid-margin stretch-card">
    <div class="card">
        <div class="card-body">
            <h3>Modification du paiement : {{ p.id }}</h3>
            <form class="forms-sample" action="{% url 'empaiement' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" class="form-control" id="id" name="matricule" value="{{ p.id }}">

                <div class="form-group">
                    <label for="amende">Amende</label>
                    <select class="form-control" id="amende" name="amende">
                        <option value="{{ p.amende }}">Selectionner une amende</option>
                        {% for a in amendes %}
                        <option value="{{ a.id }}" {% if p.amende == a %} selected {% endif %} >{{ a.montant }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="datep">Date paiement</label>
                    <input type="date" class="form-control" id="datep" name="datep" value="{{ p.datep }}">
                </div>
                <div class="form-group">
                    <label for="mode">Mode de paiement</label>
                    <input type="text" class="form-control" id="mode" name="mode" value="{{ p.mode }}">
                </div>

                <button type="submit" class="btn btn-info mr-2">Valider</button>
                <button type="reset" class="btn btn-light"><a href="{% url 'paiements' %}">Annuler</a></button>
            </form>
        </div>
    </div>
</div>  
{% endif %}
{% endblock content %} {% endcomment %}
