{% comment %} {% extends "base.html" %}
{% load static %}
{% block content %}
{% if a %}

<div class="col-12 grid-margin stretch-card">
    <div class="card">
        <div class="card-body">
            <h3>Modification de l'amende : {{ a.id }}</h3>
            <form class="forms-sample" action="{% url 'emamende' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" class="form-control" id="id" name="matricule" value="{{ a.id }}">

                <div class="form-group">
                    <label for="infraction">Infraction</label>
                    <select class="form-control" id="infraction" name="infraction">
                        <option value="{{ a.infraction }}">Selectionner une infraction</option>
                        {% for i in infractions %}
                        <option value="{{ i.id }}" {% if a.infraction == i %} selected {% endif %} >{{ i.detail }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="montant">Montant</label>
                    <input type="text" class="form-control" id="montant" name="montant" value="{{ a.montant }}">
                </div>
                <div class="form-group">
                    <label for="text">Date emission</label>
                    <input type="datem" class="form-control" id="datem" name="datem" value="{{ a.datem }}">
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <input type="text" class="form-control" id="status" name="status" value="{{ a.status }}">
                </div>

                <button type="submit" class="btn btn-info mr-2">Valider</button>
                <button type="reset" class="btn btn-light"><a href="{% url 'amendes' %}">Annuler</a></button>
            </form>
        </div>
    </div>
</div>  
{% endif %}
{% endblock content %} {% endcomment %}
