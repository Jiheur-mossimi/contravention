{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header bg-primary">
                <div class="card-title text-white">+ Nouvelle Amende</div>
            </div>
            <form class="forms-sample" method="POST" action="{% url 'eamende' %}">
                {% csrf_token %}
                <div class="card-body">
                    <div class="form-group">
                        <label>Numero</label>
                        <input 
                            type="text"
                            class="form-control form-control-lg bg-light" id="numero" placeholder="Numero" name="numero">
                    </div>
                    <div class="form-group">
                        <label>Infraction</label>
                        <input 
                            type="text"
                            class="form-control form-control-lg bg-light" id="infraction" placeholder="Infraction" name="infraction">
                    </div>
                    <div class="form-group">
                        <label>Montant</label>
                        <input 
                            type="text"
                            class="form-control form-control-lg bg-light" id="montant" placeholder="Montant" name="montant">
                    </div>
                    <div class="form-group">
                        <label>Date emission</label>
                        <input 
                            type="date"
                            class="form-control form-control-lg bg-light" id="datem" placeholder="Date emission" name="datem">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <input 
                            type="text"
                            class="form-control form-control-lg bg-light" id="status" placeholder="Status" name="status">
                    </div>
                </div>
                <div class="card-action">
                    <button type="submit" class="btn btn-success btn-lg">
                        Valider
                    </button>
                    <a href="{% url 'amendes' %}" class="btn btn-danger btn-lg">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
